<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Status Portal — WNET Group</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            color: #323130; margin: 0; padding: 20px; line-height: 1.5;
            background-color: #f4f4f9; 
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQcVe0281RAF4y_uMsdkp0j9rzTVqbqENCYFQ&s');
            background-size: cover; background-position: center; background-attachment: fixed;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; box-sizing: border-box;
        }

        .back-link-wrapper { width: 100%; max-width: 550px; margin-bottom: 15px; }
        .back-link { color: #ffffff; font-size: 14px; text-decoration: none; font-weight: 500; text-shadow: 0 1px 4px rgba(0,0,0,0.5); transition: opacity 0.2s; }
        .back-link:hover { text-decoration: underline; opacity: 0.8; }

        .portal-card { max-width: 550px; width: 100%; background: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.2); border-top: 4px solid #0078d4; box-sizing: border-box;}
        .title { font-size: 22px; color: #0078d4; margin-top: 0; margin-bottom: 10px; font-weight: 600; text-align: center; }
        .subtitle { font-size: 13px; color: #605e5c; margin-bottom: 25px; text-align: center; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; }
        input[type="email"], select, textarea { width: 100%; padding: 12px; border: 1px solid #8a8886; border-radius: 4px; box-sizing: border-box; font-size: 14px; font-family: inherit; }
        textarea { resize: vertical; }
        input:focus, select:focus, textarea:focus { border-color: #0078d4; outline: none; }

        button { background-color: #0078d4; color: #ffffff; border: none; padding: 12px 24px; border-radius: 4px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; transition: background-color 0.2s; }
        button:hover { background-color: #005a9e; }
        button:disabled { background-color: #c8c6c4; cursor: not-allowed; }

        #searchView, #dashboardView { transition: all 0.3s ease; }
        #dashboardView { display: none; }

        .meta-info { margin: 15px 0; padding: 12px; background: #faf9f8; border-radius: 4px; font-size: 14px; }
        .meta-line { margin-bottom: 6px; }

        .project-block { margin-top: 20px; padding: 15px; border: 1px solid #edebe9; border-radius: 6px; background: #ffffff; }
        .project-title { font-weight: 600; margin-bottom: 10px; font-size: 16px; color: #323130; }

        .status-banner-notice { padding: 12px 16px; border-radius: 4px; font-weight: 500; font-size: 14px; border-left: 4px solid; margin: 0;}
        .banner-queue { background-color: #f3f2f1; border-color: #a19f9d; color: #323130; }
        .banner-review { background-color: #c7e0f4; border-color: #0078d4; color: #004578; }
        .banner-decision { background-color: #dff6dd; border-color: #107c41; color: #107c41; }

        .comment-section { margin-top: 30px; padding-top: 25px; border-top: 1px solid #edebe9; }
        .alert-box { display: none; margin-top: 15px; padding: 10px; border-radius: 4px; text-align: center; font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>

<div class="back-link-wrapper">
    <a href="index.html" class="back-link">← Return to Master Gateway</a>
</div>

<div class="portal-card">
    <div id="searchView">
        <h1 class="title">Submission Status Portal</h1>
        <p class="subtitle">Enter your submission email address to track your project status in the WNET pipeline.</p>
        <form id="statusForm">
            <div class="input-group">
                <label for="lookupEmail">Registered Email Address</label>
                <input type="email" id="lookupEmail" placeholder="filmmaker@example.com" required>
            </div>
            <button type="submit" id="searchBtn">Search Title Status</button>
        </form>
    </div>

    <div id="dashboardView">
        <h1 class="title" style="text-align: left;">Project Dashboard</h1>
        
        <div class="meta-info">
            <div class="meta-line"><strong>Applicant Account:</strong> <span id="lblEmail">Loading...</span></div>
        </div>

        <!-- Container for dynamically generated projects -->
        <div id="projectsContainer"></div>

        <div class="comment-section">
            <form id="commentForm">
                <div class="input-group">
                    <label for="projectSelect">Target Project</label>
                    <select id="projectSelect" required>
                        <option value="">-- Select a project to comment on --</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="txtComment">Submit an Update or Message to the Panel</label>
                    <textarea id="txtComment" rows="3" placeholder="Type any project adjustments or comments here..." required></textarea>
                </div>
                <button type="submit" id="commentBtn">Transmit Comment Package</button>
            </form>
            <div id="commentAlert" class="alert-box"></div>
        </div>
    </div>
</div>

<script>
    const BACKEND_LOOKUP_URL = "https://defaulta5d83123285c489b9a04e4206e9908.1d.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/da24e8e4bb8549c389268dcdcd18ded6/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=w2-puSVXlvEYeHxDBdiWzXlekmUpzGq1PVGPOa21vxI";
    const BACKEND_COMMENT_URL = "https://defaulta5d83123285c489b9a04e4206e9908.1d.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/388d10b14c1444d3930b4206c7c28c3a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=V_BlJ_rzP1336YoeSEOF9LQFc_9vqyIxcSGUwugia24";

    let activeApplicantEmail = "";

    document.getElementById('statusForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const searchBtn = document.getElementById('searchBtn');
        const emailInput = document.getElementById('lookupEmail').value.trim();

        searchBtn.disabled = true;
        searchBtn.innerText = "Querying WNET Repositories...";

        try {
            const response = await fetch(BACKEND_LOOKUP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ Email: emailInput })
            });

            if (!response.ok) throw new Error("Item Not Found");
            const data = await response.json();

            activeApplicantEmail = emailInput;
            document.getElementById('lblEmail').innerText = emailInput;

            const container = document.getElementById('projectsContainer');
            const projectSelect = document.getElementById('projectSelect');
            
            container.innerHTML = ""; 
            projectSelect.innerHTML = '<option value="">-- Select a project to comment on --</option>';

            // Iterate through the array to build the UI and populate the dropdown
            data.Projects.forEach(project => {
                let title = project.Title || "Untitled Package";
                let status = project.Status || "Status Unknown";
                let projectId = project.ID || "";
                let bannerClass = "banner-queue"; 

                // Status mapping 
                if (status === "Title Review Complete, Applicant Notified" || status === "Decision Made, Expect Message Shortly") {
                    bannerClass = "banner-decision";
                } else if (status === "Under Legal Review" || status === "E&O Waiver Needed" || status === "Title under review") {
                    bannerClass = "banner-review";
                }

                // Inject visual block
                let projectBlock = `
                    <div class="project-block">
                        <div class="project-title">${title}</div>
                        <div class="status-banner-notice ${bannerClass}">
                            <strong>System Status:</strong> ${status}
                        </div>
                    </div>
                `;
                container.innerHTML += projectBlock;

                // Inject dropdown option for the comment engine
                if (projectId) {
                    let option = document.createElement('option');
                    option.value = projectId;
                    option.textContent = title;
                    projectSelect.appendChild(option);
                }
            });

            document.getElementById('searchView').style.display = "none";
            document.getElementById('dashboardView').style.display = "block";

        } catch (err) {
            alert("No matching application registry was located for this address. Please cross-reference your spelling.");
        } finally {
            searchBtn.disabled = false;
            searchBtn.innerText = "Query Database";
        }
    });

    document.getElementById('commentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const commentBtn = document.getElementById('commentBtn');
        const alertBox = document.getElementById('commentAlert');
        const commentText = document.getElementById('txtComment').value.trim();
        
        // Extract the selected ID from the dropdown menu
        const targetProjectID = document.getElementById('projectSelect').value;

        commentBtn.disabled = true;
        commentBtn.innerText = "Encrypting & Transmitting Note...";

        try {
            const res = await fetch(BACKEND_COMMENT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    RecordID: targetProjectID,
                    Email: activeApplicantEmail,
                    Comment: commentText
                })
            });

            if (!res.ok) throw new Error();

            alertBox.style.display = "block";
            alertBox.style.backgroundColor = "#dff6dd";
            alertBox.style.color = "#107c41";
            alertBox.innerText = "Comment successfully injected into panel records.";
            document.getElementById('txtComment').value = "";
            document.getElementById('projectSelect').value = "";

        } catch (err) {
            alertBox.style.display = "block";
            alertBox.style.backgroundColor = "#fde7e9";
            alertBox.style.color = "#a80000";
            alertBox.innerText = "Network execution error. Note dropped.";
        } finally {
            commentBtn.disabled = false;
            commentBtn.innerText = "Submit Comment";
        }
    });
</script>
</body>
</html>
